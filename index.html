<!DOCTYPE html>
<html>
  <head>
    <title>BOOKZ</title>
  </head>
  <body style="text-align:center;">
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: black;
      }

      h1, h2, h3, h4, h5, p {
        margin: 10px;
        color: white;
      }

      button {
        background-color: black;
        color: white;
        cursor: pointer;
        padding: 10px 20px;
      }

      ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: gray;
      }

      ul li {
        float: left;
      }

      ul li a {
        display: block;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
      }

      ul li a:hover {
        background-color: red;
      }

      li a.active {
        background-color: green;
      }
    </style>
    <ul>
      <li><a class="active" href="#home">Home</a></li>
      <li><a href="#settings">Settings</a></li>
    </ul>
    <h1 style="text-align:center;">BOOKZ</h1>
    <p>The book website everyone needs!</p>
    <p>Books ready in no time. No sign up required!</p>
    <p>We get our books through you submitting them.</p>
    <p>Click the "PUBLISH A BOOK" button to get your books on BOOKZ!</p>
    <div style="text-align:center;">
      <button onclick="document.location='#originals'">ORIGINALS</button>
    </div>
    <div style="text-align:center;">
      <button onclick="document.location='#authors'">AUTHORS</button>
    </div>
    <div style="text-align:center;">
      <button onclick="document.location='#kids'">KIDS & FAN-MADE</button>
    </div>
    <div style="text-align:center;">
      <button onclick="document.location='https://docs.google.com/forms/d/e/1FAIpQLSfF8iRean9MIHAF9dlHbUOx_bS4_8LtD-fyBtLv2HjBWEtmZA/viewform'">PUBLISH A BOOK</button>
    </div>
  </body>
</html>
